apiVersion: batch/v1
kind: CronJob
metadata:
  name: kube-bench
  namespace: security-scanning
spec:
  schedule : "0 2 * * 0" 
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: kube-bench
            image: aquasec/kube-bench:v0.15.6
            command:
            - kube-bench
            - --benchmark
            - cis-1.24
